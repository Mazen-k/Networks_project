<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload File</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    
    #dropbox {  
      border-style: dashed;
      border-color: #0d6efd;
      border-width:2px ;
      border-radius: 10px;
      padding:50px;
      text-align: center;
      color: #6c757d;
      background-color: #f8f9fa;
      cursor: pointer;
      transition: background-color 0.3s, border 0.3s;
    }
    #dropbox.dragover {
      background-color: #e2e6ea;
      border-color: #0a58ca;
    }
    #submit{
      background-color:#0a58ca;
      color: white;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">FileShare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/logs">Logs</a>
              </li>
          <li class="nav-item">
            <a class="nav-link" href="/login">Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  
  <div class="container my-5">
    <h1 class="text-center mb-4">Upload a File</h1>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <form action = "/upload" method = 'POST' enctype="multipart/form-data" id = "form">
          <div id="dropbox" class="shadow">
            <p id = "txt">Drag and drop your file here or click to select</p>
            <input type="file" name = "file" id="file" class="form-control d-none" />
          </div>
          <div class="mt-3 text-center" id="fileName">
            <button type = "submit" class = "btn btn=primary" id = "submit">Upload</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const drop = document.getElementById('dropbox');
    const file = document.getElementById('file');
    const name = document.getElementById('txt');
    const form = document.getElementById('form');
    function openFile(){
        file.click();
    }

    function showName() {
    const selected = file.files[0];
    if (selected) {
      name.textContent = `${selected.name}`;
    }
  }

    function drag(e){
        e.preventDefault();
        drop.classList.add('dragover');
    }

    function dragLeave(){
        drop.classList.remove('dragover');
    }

    function dragDrop(){
        e.preventDefault();
        drop.classList.remove('dragover');
        showName();

    }

   

    async function upload(e){
      e.preventDefault();
      const data = new  FormData();
      data.append('file',file.files[0]);

      
      try{
        const resp = await fetch('/upload' , {method : 'POST', body : data })
        if(resp.ok){
        name.textContent = "File succesfully uploaded"
        file.value = "";
      }
      else{
        name.textContent = "File failed to upload"
      }
      }
      catch(error){
        name.textContent = "File failed to upload"
      }
      
    }

    drop.addEventListener('click', openFile);
    drop.addEventListener('dragover', drag);
    drop.addEventListener('dragleave',dragLeave);
    drop.addEventListener('drop',dragDrop);
    file.addEventListener('change', showName);
    form.addEventListener('submit', upload);

    
  </script>

</body>
</html>
